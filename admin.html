<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kancha Admin — Broadcast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a0a00;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    h1 { color: #f5c842; font-size: 28px; font-weight: 900; margin-bottom: 4px; letter-spacing: 2px; }
    .sub { color: #4a2800; font-size: 13px; margin-bottom: 32px; }

    .card {
      background: #2e1500;
      border: 1px solid #3d1f00;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
    }

    .card-title { color: #f5c842; font-size: 15px; font-weight: 700; margin-bottom: 20px; }

    label { display: block; color: #888; font-size: 12px; margin-bottom: 6px; margin-top: 16px; }
    label:first-of-type { margin-top: 0; }

    input, textarea {
      width: 100%;
      background: #1a0a00;
      border: 2px solid #3d1f00;
      border-radius: 12px;
      padding: 14px 16px;
      color: #f5f5f5;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #f5c842; }
    textarea { resize: vertical; min-height: 100px; }

    .btn {
      display: block;
      width: 100%;
      background: #f5c842;
      color: #1a0a00;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-box {
      margin-top: 20px;
      background: #1a0a00;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #888;
      display: none;
      line-height: 1.6;
    }
    .status-box.show { display: block; }
    .status-box.success { color: #4ade80; border: 1px solid #166534; }
    .status-box.error   { color: #f87171; border: 1px solid #7f1d1d; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #3d1f00;
      border-top-color: #1a0a00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #login-section { display: block; }
    #broadcast-section { display: none; }

    .user-count {
      font-size: 12px;
      color: #4a2800;
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>

  <div style="font-size:36px; margin-bottom:12px;">🎱</div>
  <h1>KANCHA ADMIN</h1>
  <p class="sub">Broadcast push notifications to all players</p>

  <!-- Login -->
  <div class="card" id="login-section">
    <p class="card-title">🔐 Admin Login</p>
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter admin password"
      onkeydown="if(event.key==='Enter') login()" />
    <button class="btn" onclick="login()">Login</button>
    <div class="status-box error" id="login-error">Wrong password. Try again.</div>
  </div>

  <!-- Broadcast Panel -->
  <div class="card" id="broadcast-section">
    <p class="card-title">📢 Send Announcement</p>

    <label>Notification Title</label>
    <input type="text" id="notif-title" placeholder="e.g. Kancha 🎱" maxlength="60" />

    <label>Message</label>
    <textarea id="notif-body" placeholder="e.g. New tournament starting soon! Get ready." maxlength="200"></textarea>

    <p class="user-count" id="user-count">Loading players…</p>

    <button class="btn" id="send-btn" onclick="sendBroadcast()">Send to All Players</button>

    <div class="status-box" id="send-status"></div>
  </div>

  <!-- Firebase + logic -->
  <script type="module">
    import { initializeApp }         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── Firebase config (same as app) ────────────────────────────────────────
    const app = initializeApp({
      apiKey:            'AIzaSyDDAyWkBIMYZmzk5aLw5iW7-APG5Bc-4hk',
      authDomain:        'kancha-4af20.firebaseapp.com',
      projectId:         'kancha-4af20',
      storageBucket:     'kancha-4af20.firebasestorage.app',
      messagingSenderId: '1010760244136',
      appId:             '1:1010760244136:web:d22a5adf78c06a2cf29b9d',
    });
    const db = getFirestore(app);

    // ── Admin password — change this to whatever you want ────────────────────
    const ADMIN_PASSWORD = 'kancha@admin2026';

    // ── Login ────────────────────────────────────────────────────────────────
    window.login = function () {
      const val = document.getElementById('password-input').value;
      if (val === ADMIN_PASSWORD) {
        document.getElementById('login-section').style.display    = 'none';
        document.getElementById('broadcast-section').style.display = 'block';
        loadUserCount();
      } else {
        const err = document.getElementById('login-error');
        err.classList.add('show');
      }
    };

    // ── Count registered tokens ──────────────────────────────────────────────
    async function loadUserCount() {
      try {
        const snap = await getDocs(collection(db, 'tokens'));
        document.getElementById('user-count').textContent =
          `${snap.size} players registered for notifications`;
      } catch {
        document.getElementById('user-count').textContent = '';
      }
    }

    // ── Send broadcast ───────────────────────────────────────────────────────
    window.sendBroadcast = async function () {
      const title  = document.getElementById('notif-title').value.trim();
      const body   = document.getElementById('notif-body').value.trim();
      const btn    = document.getElementById('send-btn');
      const status = document.getElementById('send-status');

      if (!title || !body) {
        status.textContent  = 'Please fill in both title and message.';
        status.className    = 'status-box show error';
        return;
      }

      btn.disabled     = true;
      btn.innerHTML    = '<span class="spinner"></span>Sending…';
      status.className = 'status-box';

      try {
        // Fetch all tokens
        const snap   = await getDocs(collection(db, 'tokens'));
        const tokens = [];
        snap.forEach(doc => {
          const t = doc.data().token;
          if (t) tokens.push(t);
        });

        if (tokens.length === 0) {
          throw new Error('No registered devices found.');
        }

        // Send in batches of 100 (Expo Push API limit)
        const BATCH = 100;
        let sent = 0;
        for (let i = 0; i < tokens.length; i += BATCH) {
          const batch = tokens.slice(i, i + BATCH).map(to => ({
            to, title, body, sound: 'default',
          }));
          await fetch('https://exp.host/api/v2/push/send', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(batch),
          });
          sent += batch.length;
        }

        status.textContent  = `✅ Sent to ${sent} player${sent !== 1 ? 's' : ''} successfully!`;
        status.className    = 'status-box show success';
        document.getElementById('notif-title').value = '';
        document.getElementById('notif-body').value  = '';
        loadUserCount();

      } catch (e) {
        status.textContent  = `❌ Error: ${e.message}`;
        status.className    = 'status-box show error';
      } finally {
        btn.disabled  = false;
        btn.innerHTML = 'Send to All Players';
      }
    };
  </script>

</body>
</html>
